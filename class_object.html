<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object</title>
</head>
<body>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <script>
        var student={
            name:'Nischal',
            Roll:15,
            Address:'Biratnagar',
            result:'pass',
            passedExam:function(){
                return this.result;
            }
        };
        document.getElementById('p1').innerHTML=student.name;
        document.getElementById('p2').innerHTML=student.Roll;
        document.getElementById('p3').innerHTML=student.Address;
        document.write(passedExam());
    </script>
</body>
</html>
