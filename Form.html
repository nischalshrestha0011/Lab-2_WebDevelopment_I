<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
</head>
<body>

    <form action="">
        <h1 style="text-align: center;">Registtration Form </h1>

        <label for="first_name">First Name:</label>

        <label for="second_name:">Last Name:</label>
        <input type="text" name="second_name" id="second_name" placeholder="Shrestha"><br><br>
