<head>

    <title>BOX</title>
    <style>
        .container{
            width: 400px;
            height: 400px;
        }
        #one{
            width: 200px;

        }
        #two{

            height: 200px;
            background-color: green;
            float:right;
        }
        #three{
             width: 200px;
            height: 200px;
            background-color: yellow;
            float:left;
        }
        #four{
            width: 200px;
            height: 200px;
            background-color: blue;
            float:right;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div id="one"></div>
        <div id="two"></div>
        <div id="three"></div>
        <div id="four"></div>
    </div>
</body>
</html>
